<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradients -->
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00E0FF"/>
      <stop offset="100%" stop-color="#8000FF"/>
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF007F"/>
      <stop offset="100%" stop-color="#8000FF"/>
    </linearGradient>
    <linearGradient id="grad3" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#8000FF"/>
      <stop offset="100%" stop-color="#00E0FF"/>
    </linearGradient>
    <!-- Glow Effect -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="15" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="glowSmall" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Outer futuristic frame -->
  <rect x="50" y="50" width="300" height="300" rx="70" fill="none" stroke="url(#grad1)" stroke-width="12" filter="url(#glow)"/>
  <rect x="50" y="50" width="300" height="300" rx="70" fill="none" stroke="#ffffff" stroke-width="4" opacity="0.6"/>

  <!-- Abstract Wave Forms / Signal Rings -->
  <circle cx="200" cy="200" r="90" fill="none" stroke="url(#grad2)" stroke-width="6" stroke-dasharray="30 20" filter="url(#glowSmall)"/>
  <circle cx="200" cy="200" r="115" fill="none" stroke="url(#grad3)" stroke-width="4" stroke-dasharray="15 35" filter="url(#glowSmall)" opacity="0.8"/>

  <!-- Play Button (Center) -->
  <path d="M 165 145 L 265 200 L 165 255 Z" fill="url(#grad1)" filter="url(#glow)"/>
  <!-- Play Center Highlight -->
  <path d="M 170 155 L 250 200 L 170 245 Z" fill="#ffffff" opacity="0.9"/>
</svg>