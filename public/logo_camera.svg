<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradients for the Neon Pulse Theme -->
    <linearGradient id="neonCyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00E0FF"/>
      <stop offset="100%" stop-color="#4A00E0"/>
    </linearGradient>
    <linearGradient id="neonPink" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF007A"/>
      <stop offset="100%" stop-color="#8000FF"/>
    </linearGradient>
    <linearGradient id="cyberPurple" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#8A2BE2"/>
      <stop offset="100%" stop-color="#D900FF"/>
    </linearGradient>
    
    <!-- Neon Glow Filters -->
    <filter id="glowHeavy" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="16" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="glowMid" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- High-Tech Outer Frame -->
  <rect x="40" y="40" width="320" height="320" rx="80" fill="none" stroke="url(#neonCyan)" stroke-width="12" filter="url(#glowHeavy)"/>
  <rect x="40" y="40" width="320" height="320" rx="80" fill="none" stroke="#ffffff" stroke-width="3" opacity="0.6"/>

  <!-- Livestream Signal Waves (Corner Accents) -->
  <path d="M 120 40 A 80 80 0 0 0 40 120" fill="none" stroke="url(#cyberPurple)" stroke-width="10" filter="url(#glowMid)"/>


  <!-- Camera Body -->
  <rect x="100" y="130" width="200" height="140" rx="28" fill="none" stroke="url(#neonPink)" stroke-width="12" filter="url(#glowHeavy)"/>
  <rect x="100" y="130" width="200" height="140" rx="28" fill="none" stroke="#ffffff" stroke-width="3" opacity="0.8"/>

  <!-- Camera Flash / Top Mount -->
  <rect x="140" y="95" width="60" height="35" rx="12" fill="url(#neonCyan)" filter="url(#glowMid)"/>
  <rect x="145" y="100" width="50" height="25" rx="8" fill="#ffffff" opacity="0.9"/>


  <!-- Lens Outer Ring -->
  <circle cx="200" cy="200" r="48" fill="none" stroke="url(#neonCyan)" stroke-width="12" filter="url(#glowMid)"/>
  
  <!-- Lens Inner Core -->
  <circle cx="200" cy="200" r="32" fill="url(#cyberPurple)" filter="url(#glowMid)"/>
  <circle cx="200" cy="200" r="32" fill="#ffffff" opacity="0.75"/>
  <circle cx="205" cy="195" r="8" fill="#ffffff" opacity="0.9"/> <!-- Highlight reflection -->

  <!-- Recording Indicator (Red Dot) -->
  <circle cx="265" cy="165" r="10" fill="#FF0040" filter="url(#glowMid)">
    <animate attributeName="opacity" values="1;0.3;1" dur="1.5s" repeatCount="indefinite" />
  </circle>
  <circle cx="265" cy="165" r="5" fill="#ffffff"/>

</svg>